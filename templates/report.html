<!DOCTYPE html>
<html>
<head>
    <title>Report Complaint</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="header">
    <h1>💧 AquaFix</h1>
    <p>Report Water-Related Issues</p>
</div>

<div class="container">

    <div class="card">

        <h1>📝 Report Water Complaint</h1>

        <form method="POST">

            <input
                type="text"
                name="name"
                placeholder="Your Name"
                required>

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <input
                type="text"
                name="phone"
                placeholder="Phone Number"
                required>

            <select name="issue_type" required>
                <option value="">Select Issue</option>
                <option>No Water Supply</option>
                <option>Dirty Water</option>
                <option>Pipe Leakage</option>
                <option>Low Pressure</option>
                <option>Water Wastage</option>
            </select>

            <textarea
                name="description"
                placeholder="Describe the issue"
                required></textarea>

            <input
                type="text"
                name="location"
                placeholder="Area / Location"
                required>

            <!-- Hidden GPS Fields -->
            <input type="hidden" id="lat" name="lat">
            <input type="hidden" id="lng" name="lng">

            <button type="button" onclick="getLocation()">
                📍 Get My Location
            </button>

            <br><br>

            <button type="submit">
                Submit Complaint
            </button>

        </form>

        <br>

        <a href="/" class="btn">🏠 Back Home</a>

    </div>

</div>

<script>

// Automatically try to get location when page loads
window.onload = function() {

    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(function(position) {

            document.getElementById("lat").value =
                position.coords.latitude;

            document.getElementById("lng").value =
                position.coords.longitude;

        });

    }

};

// Manual button
function getLocation() {

    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(function(position) {

            document.getElementById("lat").value =
                position.coords.latitude;

            document.getElementById("lng").value =
                position.coords.longitude;

            alert("✅ Location captured successfully!");

        });

    } else {

        alert("❌ Geolocation is not supported by this browser.");

    }

}

// Prevent submission if location is missing
document.querySelector("form").addEventListener("submit", function(e){

    let lat = document.getElementById("lat").value;
    let lng = document.getElementById("lng").value;

    if(lat === "" || lng === ""){

        alert("📍 Please click 'Get My Location' before submitting.");

        e.preventDefault();
    }

});

</script>

</body>
</html>
